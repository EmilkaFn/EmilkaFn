<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="restTitle restDesc">
  <title id="restTitle">REST APIs</title>
  <desc id="restDesc">Premium API icon with a large blue cloud, stronger shadow, and darker API text on a blue background.</desc>

  <defs>
