<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="restTitle restDesc">
  <title id="restTitle">REST APIs</title>
  <desc id="restDesc">Defined light-blue cloud with dark API text on a blue background.</desc>

  <defs>
    <!-- blue background -->
    <linearGradient id="bg" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4E8FF7"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2F6FDE"/>
    </linearGradient>

    <!-- light cloud -->
    <linearGradient id="cloud" x1="10" y1="11" x2="38" y2="33" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFF"/>
      <stop offset="0.45" stop-color="#E4F4FF"/>
      <stop offset="1" stop-color="#CBEAFF"/>
    </linearGradient>

    <!-- soft cloud shadow -->
    <filter id="cloudShadow" x="7" y="10" width="34" height="25" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="1.15" stdDeviation="1.15" flood-color="#2458B8" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- clearer cloud shape -->
  <g filter="url(#cloudShadow)">
    <path
      d="M14.2 31.2C11.8 31.2 9.9 29.3 9.9 26.9C9.9 24.8 11.4 23 13.5 22.7C13.9 18.6 17.3 15.4 21.5 15.4C24.2 15.4 26.6 16.7 28 18.7C28.7 18.1 29.7 17.8 30.8 17.8C33.3 17.8 35.4 19.5 35.9 21.8C38.2 22.2 40 24.2 40 26.7C40 29.2 38 31.2 35.5 31.2H14.2Z"
      fill="url(#cloud)"
    />
  </g>

  <text
    x="24"
    y="28"
    text-anchor="middle"
    fill="#2458B8"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="8.8"
    font-weight="900"
    letter-spacing="0.15"
  >
    API
  </text>
</svg>
