<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="restTitle restDesc">
  <title id="restTitle">REST APIs</title>
  <desc id="restDesc">Premium API icon with a large elegant cloud on a blue background.</desc>

  <defs>
    <!-- background adjusted to feel closer to other stack icons -->
    <linearGradient id="bg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.58" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>

    <!-- more premium cloud gradient -->
    <linearGradient id="cloud" x1="10" y1="11" x2="39" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFF"/>
      <stop offset="0.45" stop-color="#EAF5FF"/>
      <stop offset="1" stop-color="#CFE7FF"/>
    </linearGradient>

    <!-- cloud shadow -->
    <filter id="cloudShadow" x="4" y="8" width="40" height="30" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.25" flood-color="#1846A3" flood-opacity="0.34"/>
    </filter>

    <!-- subtle text shadow -->
    <filter id="textShadow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="0.45" stdDeviation="0.35" flood-color="#FFFFFF" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- larger, more cloud-like shape -->
  <g filter="url(#cloudShadow)">
    <path
      d="M13.1 34H35.2C39.2 34 42.3 31 42.3 27.2C42.3 23.9 39.9 21.1 36.8 20.5C35.6 15.8 31.5 12.4 26.7 12.4C22.6 12.4 18.9 14.9 17.2 18.7C16.7 18.6 16.1 18.5 15.5 18.5C11.9 18.5 9 21.3 8.7 24.9C6.9 26 5.7 27.9 5.7 30.1C5.7 32.3 7.5 34 9.7 34H13.1Z"
      fill="url(#cloud)"
    />
  </g>

  <text
    x="24"
    y="29.2"
    text-anchor="middle"
    fill="#1E4FAE"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="11"
    font-weight="900"
    letter-spacing="0.12"
    filter="url(#textShadow)"
  >
    API
  </text>
</svg>
