<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="restTitle restDesc">
  <title id="restTitle">REST APIs</title>
  <desc id="restDesc">Large light-blue API cloud on a slightly darker blue background.</desc>

  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#256FB8"/>
      <stop offset="0.55" stop-color="#1E5FA5"/>
      <stop offset="1" stop-color="#184F8F"/>
    </linearGradient>

    <linearGradient id="cloud" x1="8" y1="10" x2="39" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ED8FF"/>
      <stop offset="0.5" stop-color="#6FC2FF"/>
      <stop offset="1" stop-color="#42A5F5"/>
    </linearGradient>

    <filter id="cloudShadow" x="3" y="6" width="42" height="31" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="1.1" stdDeviation="1.15" flood-color="#0E3F73" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#bg)"/>

  <g filter="url(#cloudShadow)">
    <path
      d="M11.8 33H34.7C38.9 33 42.1 29.8 42.1 25.8C42.1 22.2 39.5 19.2 36.1 18.6C34.7 14 30.5 10.8 25.4 10.8C20.2 10.8 15.9 14.3 14.7 19.2C10.7 19.8 7.7 23.2 7.7 27.3C7.7 30.7 9.7 33 11.8 33Z"
      fill="url(#cloud)"
    />
  </g>

  <text
    x="24"
    y="28"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="8.8"
    font-weight="900"
    letter-spacing="0.2"
  >
    API
  </text>
</svg>
