<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dsaTitle dsaDesc">
  <title id="dsaTitle">Data Structures and Algorithms</title>
  <desc id="dsaDesc">Green icon with a large centered white binary tree symbol.</desc>

  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>

    <filter id="treeShadow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="0.75" stdDeviation="0.65" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#bg)"/>

  <g filter="url(#treeShadow)">
    <!-- larger centered binary tree -->
    <g stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="24" y1="11.5" x2="17" y2="20"/>
      <line x1="24" y1="11.5" x2="31" y2="20"/>

      <line x1="17" y1="20" x2="11.5" y2="30"/>
      <line x1="17" y1="20" x2="21.5" y2="30"/>

      <line x1="31" y1="20" x2="26.5" y2="30"/>
      <line x1="31" y1="20" x2="36.5" y2="30"/>
    </g>

    <g fill="#FFFFFF">
      <circle cx="24" cy="11.5" r="2.35"/>
      <circle cx="17" cy="20" r="2.15"/>
      <circle cx="31" cy="20" r="2.15"/>

      <circle cx="11.5" cy="30" r="1.95"/>
      <circle cx="21.5" cy="30" r="1.95"/>
      <circle cx="26.5" cy="30" r="1.95"/>
      <circle cx="36.5" cy="30" r="1.95"/>
    </g>
  </g>
</svg>
