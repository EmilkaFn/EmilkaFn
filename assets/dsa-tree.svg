<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dsaTitle dsaDesc">
  <title id="dsaTitle">Data Structures and Algorithms</title>
  <desc id="dsaDesc">Green DSA icon with a white binary tree and Python-yellow logo text, both with subtle shadow.</desc>

  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>

    <filter id="treeShadow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="0.6" stdDeviation="0.55" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="textShadow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="0.7" stdDeviation="0.6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#bg)"/>

  <g filter="url(#treeShadow)">
    <g stroke="#FFFFFF" stroke-width="0.78" stroke-linecap="round" stroke-linejoin="round">
      <line x1="24" y1="9.5" x2="18.2" y2="18.0"/>
      <line x1="24" y1="9.5" x2="29.8" y2="18.0"/>
      <line x1="18.2" y1="18.0" x2="13.7" y2="25.1"/>
      <line x1="18.2" y1="18.0" x2="22.7" y2="25.1"/>
      <line x1="29.8" y1="18.0" x2="34.3" y2="25.1"/>
    </g>

    <g fill="#FFFFFF">
      <circle cx="24" cy="9.5" r="1.45"/>
      <circle cx="18.2" cy="18.0" r="1.3"/>
      <circle cx="29.8" cy="18.0" r="1.3"/>
      <circle cx="13.7" cy="25.1" r="1.15"/>
      <circle cx="22.7" cy="25.1" r="1.15"/>
      <circle cx="34.3" cy="25.1" r="1.15"/>
    </g>
  </g>

  <text
    x="24"
    y="37"
    text-anchor="middle"
    fill="#FFD43B"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="9.4"
    font-weight="900"
    letter-spacing="0.15"
    filter="url(#textShadow)"
  >
    DSA
  </text>
</svg>
