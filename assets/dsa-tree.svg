<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dsaTitle dsaDesc">
  <title id="dsaTitle">Data Structures and Algorithms</title>
  <desc id="dsaDesc">Green icon with an extra-large centered white binary tree symbol and strong shadow.</desc>

  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>

    <filter id="treeShadow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.1" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#bg)"/>

  <g filter="url(#treeShadow)">
    <!-- ~25% larger centered binary tree -->
    <g stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <line x1="24" y1="8.8" x2="15.8" y2="19.0"/>
      <line x1="24" y1="8.8" x2="32.2" y2="19.0"/>

      <line x1="15.8" y1="19.0" x2="9.6" y2="33.2"/>
      <line x1="15.8" y1="19.0" x2="21.0" y2="33.2"/>

      <line x1="32.2" y1="19.0" x2="27.0" y2="33.2"/>
      <line x1="32.2" y1="19.0" x2="38.4" y2="33.2"/>
    </g>

    <g fill="#FFFFFF">
      <circle cx="24" cy="8.8" r="3.2"/>
      <circle cx="15.8" cy="19.0" r="2.9"/>
      <circle cx="32.2" cy="19.0" r="2.9"/>

      <circle cx="9.6" cy="33.2" r="2.6"/>
      <circle cx="21.0" cy="33.2" r="2.6"/>
      <circle cx="27.0" cy="33.2" r="2.6"/>
      <circle cx="38.4" cy="33.2" r="2.6"/>
    </g>
  </g>
</svg>
